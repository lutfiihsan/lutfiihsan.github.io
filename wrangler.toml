name = "myporto-api"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# API-only worker — frontend di GitHub Pages (lutfiihsan.github.io)
# Setelah deploy pertama, isi API_BASE_URL dengan URL worker Anda:
#   https://myporto-api.<account>.workers.dev

[vars]
ALLOWED_ORIGINS = "https://lutfiihsan.github.io,http://localhost:5173,http://127.0.0.1:5173"
API_BASE_URL = "https://myporto-api.lawlieth404.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "myporto-db"
database_id = "f82bb04c-8cd7-4bea-bcee-57dbec9fab93"

# Aktifkan setelah R2 di-enable di dashboard Cloudflare:
# https://dash.cloudflare.com → R2 → Enable R2
# Lalu: npx wrangler r2 bucket create myporto-media
# Uncomment baris di bawah dan deploy ulang:
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "myporto-media"

# Set via: wrangler secret put JWT_SECRET

[dev]
port = 8787
