<!-- EDITOR MODAL -->
<div id="post-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modal-title">Artikel Baru</h2>
      <button class="btn-close" onclick="closeEditor()" aria-label="Tutup"><i class="fas fa-times"></i></button>
    </div>

    <div id="modal-loading" class="loading-spinner" style="display:none;">
      <i class="fas fa-spinner fa-spin"></i> Memuat data artikel...
    </div>

    <form id="post-form" style="display:block;">
      <input type="hidden" id="post-id">

      <div class="form-group">
        <label for="post-title">Judul Artikel *</label>
        <input type="text" id="post-title" placeholder="Masukkan judul artikel..." required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="post-slug">Slug (URL)</label>
          <input type="text" id="post-slug" placeholder="auto-generated-from-title">
        </div>
        <div class="form-group">
          <label for="post-published">Status</label>
          <select id="post-published">
            <option value="0">📝 Draft</option>
            <option value="1">🌐 Published</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="post-excerpt">Ringkasan / Excerpt</label>
        <textarea id="post-excerpt" placeholder="Deskripsi singkat artikel..." rows="2" style="min-height: 80px;"></textarea>
      </div>

      <div class="form-group">
        <label for="post-content">Konten Artikel *</label>
        <div class="quill-wrapper">
          <div id="quill-editor"></div>
        </div>
        <!-- Hidden textarea to hold HTML value for form submit -->
        <textarea id="post-content" style="display:none;"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="post-cover">Gambar Cover</label>
          <input type="url" id="post-cover" placeholder="https://... atau upload">
          <div style="margin-top:0.8rem; display:flex; gap:0.8rem; align-items:center;">
            <input type="file" id="post-cover-file" accept="image/jpeg,image/png,image/webp,image/gif" style="flex:1;">
          </div>
        </div>
        <div class="form-group">
          <label for="post-tags">Tags (pisah dengan koma)</label>
          <input type="text" id="post-tags" placeholder="Laravel, PHP, Tutorial">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeEditor()">
          <i class="fas fa-times"></i> Batal
        </button>
        <button type="submit" id="btn-save" class="btn-primary">
          <i class="fas fa-save"></i> Simpan
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ADD USER MODAL -->
<div id="user-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card" style="max-width:480px;">
    <div class="modal-header">
      <h2>Tambah Pengguna</h2>
      <button class="btn-close" onclick="closeAddUserModal()" aria-label="Tutup"><i class="fas fa-times"></i></button>
    </div>
    <form id="user-form">
      <div class="form-group">
        <label for="user-email-input">Email *</label>
        <input type="email" id="user-email-input" placeholder="editor@example.com" required>
      </div>
      <div class="form-group">
        <label for="user-pass-input">Password * (min. 8 karakter)</label>
        <input type="password" id="user-pass-input" placeholder="Password" required minlength="8">
      </div>
      <div class="form-group">
        <label for="user-role-input">Role</label>
        <select id="user-role-input">
          <option value="editor">Editor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeAddUserModal()">Batal</button>
        <button type="submit" id="btn-save-user" class="btn-primary">
          <i class="fas fa-user-plus"></i> Simpan
        </button>
      </div>
    </form>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div id="password-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card" style="max-width:480px;">
    <div class="modal-header">
      <h2>Ganti Password</h2>
      <button class="btn-close" onclick="closeChangePasswordModal()" aria-label="Tutup"><i class="fas fa-times"></i></button>
    </div>
    <form id="password-form">
      <div class="form-group">
        <label for="current-password">Password Lama *</label>
        <input type="password" id="current-password" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="new-password">Password Baru * (min. 8 karakter)</label>
        <input type="password" id="new-password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm-password">Konfirmasi Password Baru *</label>
        <input type="password" id="confirm-password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeChangePasswordModal()">Batal</button>
        <button type="submit" id="btn-save-password" class="btn-primary">
          <i class="fas fa-key"></i> Simpan
        </button>
      </div>
    </form>
  </div>
</div>
