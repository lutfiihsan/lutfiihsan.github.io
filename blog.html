<!DOCTYPE html>
<html lang="id">
<head>
  <load src="./partials/portfolio-head.html" />
  <title>Blog | Lutfi Ihsan — Full Stack Developer</title>
  <meta name="description" content="Artikel, tutorial, dan insight seputar teknologi dari Lutfi Ihsan.">
  <link rel="stylesheet" href="./assets/css/blog.css">
</head>

<body>

  <!-- Navbar -->
  <load src="./partials/portfolio-nav.html" />

  <main>
    <!-- Blog Hero -->
    <section class="blog-hero">
      <div class="blog-hero-content">
        <div class="hero-badge"><i class="fas fa-pencil-alt"></i> Blog & Tulisan</div>
        <h1>Tulisan <span>Teknis</span> & Insight</h1>
        <p>Catatan, tutorial, dan pemikiran seputar Full Stack Development, SysAdmin, dan teknologi modern.</p>
      </div>
    </section>

    <!-- Posts Grid -->
    <section class="blog-section">
      <div class="blog-container">
        <div id="blog-posts-grid" class="blog-grid">
          <!-- Rendered by JS -->
          <div class="blog-loading"><i class="fas fa-spinner fa-spin"></i> Memuat artikel...</div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <load src="./partials/portfolio-footer.html" />

  <load src="./partials/portfolio-scripts.html" />
  <script type="module" src="./assets/js/blog.js"></script>
  <script>
    // Simple navbar toggle reuse
    const menuBtn = document.getElementById('menu');
    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        menuBtn.classList.toggle('fa-times');
        document.querySelector('.navbar').classList.toggle('nav-toggle');
      });
    }
  </script>
</body>
</html>
