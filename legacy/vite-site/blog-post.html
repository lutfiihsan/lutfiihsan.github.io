<!DOCTYPE html>
<html lang="id">
<head>
  <load src="./partials/portfolio-head.html" />
  <title>Artikel | Blog — Lutfi Ihsan</title>
  <meta name="author" content="Lutfi Ihsan">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap">
  <!-- Quill CSS for rendering rich content -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css">
  <link rel="stylesheet" href="./assets/css/blog.css">
</head>

<body>

  <!-- Navbar -->
  <load src="./partials/portfolio-nav.html" />

  <main class="post-main">
    <div id="post-container">
      <!-- Rendered by JS -->
      <div class="blog-loading" style="padding-top: 12rem;">
        <i class="fas fa-spinner fa-spin"></i> Memuat artikel...
      </div>
    </div>
  </main>

  <!-- Footer -->
  <load src="./partials/portfolio-footer.html" />

  <load src="./partials/portfolio-scripts.html" />
  <script type="module" src="./assets/js/blog.js"></script>
  <script>
    const menuBtn = document.getElementById('menu');
    if (menuBtn) {
      menuBtn.addEventListener('click', () => {
        menuBtn.classList.toggle('fa-times');
        document.querySelector('.navbar').classList.toggle('nav-toggle');
      });
    }
  </script>
</body>
</html>
